<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eeeAI - Smart Workspace</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg-dark: #090a0f;
      --sidebar-bg: #0f121d;
      --panel-bg: rgba(20, 24, 35, 0.6);
      --border-color: rgba(0, 195, 255, 0.15);
      --accent-color: #00c3ff;
      --accent-gradient: linear-gradient(135deg, #007bff, #00c3ff);
      --text-main: #f0f4f8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ーーー サイドバー（複数チャット管理） ーーー */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
      z-index: 20;
    }

    .new-chat-btn {
      background: rgba(0, 195, 255, 0.1);
      border: 1px dashed var(--accent-color);
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      text-align: center;
    }
    .new-chat-btn:hover { background: var(--accent-gradient); transform: translateY(-1px); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.2s;
      color: #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-item:hover, .chat-item.active {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }
    .chat-item.active {
      border-left: 3px solid var(--accent-color);
      background: rgba(0, 195, 255, 0.05);
    }
    .delete-chat {
      font-size: 12px;
      color: #ff4a4a;
      opacity: 0;
      cursor: pointer;
    }
    .chat-item:hover .delete-chat { opacity: 1; }

    /* ーーー メインコンテンツエリア ーーー */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: radial-gradient(circle at 50% 50%, #121625, var(--bg-dark) 80%);
    }

    .header {
      background: rgba(9, 10, 15, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand { font-size: 20px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 195, 255, 0.6); }

    /* モード切り替えスイッチ */
    .mode-container { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .switch {
      position: relative; display: inline-block; width: 44px; height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333; border-radius: 22px; transition: .3s;
    }
    .slider:before {
      position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
      background-color: white; border-radius: 50%; transition: .3s;
    }
    input:checked + .slider { background: var(--accent-gradient); }
    input:checked + .slider:before { transform: translateX(22px); }

    .chat-box {
      flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 24px;
    }

    .message {
      max-width: 80%; padding: 16px 20px; border-radius: 16px; font-size: 15px; line-height: 1.6;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px);
    }
    
    .user { 
      align-self: flex-end; 
      background: var(--accent-gradient); 
      color: #fff; 
      border-bottom-right-radius: 4px; 
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3); 
      white-space: pre-wrap; 
    }
    
    .ai { align-self: flex-start; background: var(--panel-bg); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); }

    /* AIマークダウン内の装飾 */
    .ai p { margin-bottom: 10px; }
    .ai p:last-child { margin-bottom: 0; }
    .ai ul, .ai ol { margin-left: 20px; margin-bottom: 10px; }
    .ai code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    .ai pre { background: #1e1e24; padding: 14px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid rgba(255,255,255,0.05); }
    .ai pre code { background: none; padding: 0; }

    /* 入力コンテナ */
    .input-container { padding: 24px 15%; background: rgba(9, 10, 15, 0.9); border-top: 1px solid var(--border-color); }
    .input-area { display: flex; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 16px; padding: 10px 14px; gap: 12px; align-items: flex-end; }
    .input-area:focus-within { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 195, 255, 0.2); }
    
    textarea { 
      flex: 1; 
      resize: none; 
      border: none; 
      background: transparent; 
      color: #fff; 
      font-size: 15.5px; 
      padding: 4px 0; 
      outline: none; 
      height: 28px; 
      max-height: 150px; 
      font-family: inherit; 
      line-height: 1.5;
    }
    
    button { height: 36px; padding: 0 20px; border: none; border-radius: 10px; background: var(--accent-gradient); color: #fff; font-weight: 600; cursor: pointer; transition: all 0.2s ease; margin-bottom: 2px; }
    button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 195, 255, 0.5); }
    button:disabled { background: #333; color: #777; cursor: not-allowed; transform: none; box-shadow: none; }

    /* クレジット */
    .footer { text-align: center; font-size: 12px; color: #555; padding: 10px 0; background: var(--bg-dark); border-top: 1px solid rgba(255,255,255,0.02); }

    .typing-indicator { display: flex; gap: 5px; padding: 4px 0; }
    .typing-indicator span { width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .chat-box, .input-container { padding: 20px 5%; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="new-chat-btn" id="newChatBtn">＋ 新しいチャット</div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="main-content">
    <div class="header">
      <div class="brand">eeeAI</div>
      <div class="mode-container">
        <span>💻 プログラミングモード</span>
        <label class="switch">
          <input type="checkbox" id="modeToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    
    <div id="chatBox" class="chat-box"></div>
    
    <div class="input-container">
      <div class="input-area">
        <textarea id="promptInput" placeholder="eeeAI にメッセージを送信... (Ctrl+Enterで送信)"></textarea>
        <button id="submitBtn">Send</button>
      </div>
    </div>
    
    <div class="footer">Powered by eeesutudio</div>
  </div>

  <script>
    const API_KEY = "AIzaSyD3wvU-sGDeTc5wAnHYCmYcjmGfmE8oBt0";
    const chatBox = document.getElementById("chatBox");
    const promptInput = document.getElementById("promptInput");
    const submitBtn = document.getElementById("submitBtn");
    const chatListEl = document.getElementById("chatList");
    const newChatBtn = document.getElementById("newChatBtn");
    const modeToggle = document.getElementById("modeToggle");

    let threads = JSON.parse(localStorage.getItem("eeeAI_threads")) || {};
    let currentThreadId = localStorage.getItem("eeeAI_currentThread") || "";

    marked.setOptions({
      breaks: true,
      highlight: function(code) { return hljs.highlightAuto(code).value; }
    });

    window.addEventListener('DOMContentLoaded', () => {
      if (Object.keys(threads).length === 0) {
        createNewThread();
      } else {
        if (!threads[currentThreadId]) currentThreadId = Object.keys(threads)[0];
        renderSidebar();
        loadThread(currentThreadId);
      }
      adjustTextareaHeight();
    });

    function adjustTextareaHeight() {
      promptInput.style.height = '28px'; 
      promptInput.style.height = promptInput.scrollHeight + 'px'; 
    }
    promptInput.addEventListener('input', adjustTextareaHeight);

    function createNewThread() {
      const id = "thread_" + Date.now();
      threads[id] = {
        title: "新しいチャット",
        messages: [{ text: "こんにちは！私はeeeAIです。何でも聞いてくださいね！", sender: "ai", isHTML: false }]
      };
      currentThreadId = id;
      saveData();
      renderSidebar();
      loadThread(id);
      adjustTextareaHeight();
    }

    function renderSidebar() {
      chatListEl.innerHTML = "";
      Object.keys(threads).sort((a,b) => b.split("_")[1] - a.split("_")[1]).forEach(id => {
        const item = document.createElement("div");
        item.className = `chat-item ${id === currentThreadId ? 'active' : ''}`;
        item.innerHTML = `
          <span>${threads[id].title}</span>
          <span class="delete-chat" onclick="deleteThread(event, '${id}')">✕</span>
        `;
        item.addEventListener("click", () => {
          currentThreadId = id;
          localStorage.setItem("eeeAI_currentThread", id);
          renderSidebar();
          loadThread(id);
          adjustTextareaHeight();
        });
        chatListEl.appendChild(item);
      });
    }

    function loadThread(id) {
      chatBox.innerHTML = "";
      threads[id].messages.forEach(msg => {
        addMessageToDOM(msg.text, msg.sender, msg.isHTML);
      });
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.deleteThread = function(e, id) {
      e.stopPropagation();
      delete threads[id];
      if (currentThreadId === id) {
        currentThreadId = Object.keys(threads)[0] || "";
      }
      if (currentThreadId === "") {
        createNewThread();
      } else {
        saveData();
        renderSidebar();
        loadThread(currentThreadId);
      }
    }

    function saveData() {
      localStorage.setItem("eeeAI_threads", JSON.stringify(threads));
      localStorage.setItem("eeeAI_currentThread", currentThreadId);
    }

    async function handleMessage() {
      const prompt = promptInput.value.trim();
      if (!prompt) return;

      if (threads[currentThreadId].messages.length <= 1 && threads[currentThreadId].title === "新しいチャット") {
        threads[currentThreadId].title = prompt.substring(0, 12).replace(/\n/g, " "); 
      }

      const userPrompt = promptInput.value;

      threads[currentThreadId].messages.push({ text: userPrompt, sender: "user", isHTML: false });
      addMessageToDOM(userPrompt, "user");
      promptInput.value = "";
      promptInput.style.height = '28px'; 
      submitBtn.disabled = true;
      saveData();
      renderSidebar();

      const loadingBubble = addMessageToDOM('<div class="typing-indicator"><span></span><span></span><span></span></div>', "ai", true);

      let systemPrompt = "";
      if (modeToggle.checked) {
        systemPrompt = "【システム命令：あなたは超一流のプログラミング講師でありシニアエンジニアです。初心者の質問には専門用語を噛み砕いて説明し、提供されたコードのバグを修正する場合は、修正後の綺麗なコードブロックと、なぜバグが起きたかの原因を箇条書きで分かりやすく教えてください。】\n\n";
      } else {
        systemPrompt = "【システム命令：なじみやすい親切なAIアシスタントとして会話してください。】\n\n";
      }

      try {
        const res = await fetch(
          "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              contents: [{ 
                parts: [{ 
                  text: systemPrompt + userPrompt 
                }] 
              }]
            })
          }
        );
        
        const data = await res.json();
        
        if (!res.ok) {
          if (res.status === 429) {
            loadingBubble.innerHTML = `<span style="color:#ff4a4a;">⚠️ Googleの無料枠制限(429)を超えました。数10秒ほど待ってから再度お試しください。</span>`;
          } else {
            loadingBubble.innerHTML = `<span style="color:#ff4a4a;">Error ${res.status}: ${data.error?.message || "Unknown error"}</span>`;
          }
          return;
        }

        const output = data?.candidates?.[0]?.content?.parts?.[0]?.text || "返答がありませんでした。";
        const parsedHTML = marked.parse(output);
        
        loadingBubble.innerHTML = parsedHTML;
        loadingBubble.querySelectorAll('pre code').forEach((block) => { hljs.highlightElement(block); });

        threads[currentThreadId].messages.push({ text: parsedHTML, sender: "ai", isHTML: true });
        saveData();

      } catch (err) {
        loadingBubble.innerHTML = `<span style="color:#ff4a4a;">ネットワークエラー: ${err.message}</span>`;
      } finally {
        submitBtn.disabled = false;
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    function addMessageToDOM(text, sender, isHTML = false) {
      const msg = document.createElement("div");
      msg.className = "message " + sender;
      if (sender === "ai" || isHTML) { msg.innerHTML = text; } else { msg.textContent = text; }
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msg;
    }

    submitBtn.addEventListener("click", handleMessage);
    newChatBtn.addEventListener("click", createNewThread);

    promptInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        handleMessage();
      }
    });
  </script>
</body>
</html>
